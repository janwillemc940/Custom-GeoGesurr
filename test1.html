<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGuessr Clone</title>

<style>
html,body{
    margin:0;
    height:100%;
    font-family:Arial,sans-serif;
}

#game{
    display:flex;
    height:100vh;
}

#streetview{
    width:60%;
    height:100%;
}

#map{
    width:40%;
    height:100%;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
}

button{
    padding:8px 14px;
    cursor:pointer;
}

#result{
    margin-top:10px;
    font-size:14px;
}

#score{
    font-weight:bold;
}
</style>
</head>
<body>

<div id="ui">
    <div>Ronde: <span id="round">1</span>/5</div>
    <div id="score">Score: 0</div>
    <br>
    <button id="guessBtn" disabled>
        Bevestig gok
    </button>
    <div id="result"></div>
</div>

<div id="game">
    <div id="streetview"></div>
    <div id="map"></div>
</div>

<script>

let map;
let panorama;

let guessMarker = null;
let realMarker = null;
let line = null;

let currentRound = 0;
let totalScore = 0;

let guessPosition = null;
let actualLocation = null;

const maxRounds = 5;

/*
Eigen locaties.
Voeg hier onbeperkt locaties toe.
*/

const locations = [

{lat:52.373169,lng:4.891064},     // Amsterdam
{lat:48.858370,lng:2.294481},     // Eiffel Tower
{lat:40.758000,lng:-73.985500},   // Times Square
{lat:35.658580,lng:139.745433},   // Tokyo Tower
{lat:-33.856784,lng:151.215297},  // Sydney Opera
{lat:51.500729,lng:-0.124625},    // Big Ben
{lat:41.890210,lng:12.492231},    // Colosseum
{lat:52.516275,lng:13.377704},    // Brandenburg Gate
{lat:37.819928,lng:-122.478255},  // Golden Gate
{lat:27.175015,lng:78.042155}     // Taj Mahal

];

function initMap(){

    map = new google.maps.Map(
        document.getElementById("map"),
        {
            center:{lat:20,lng:0},
            zoom:2,
            streetViewControl:false
        }
    );

    panorama = new google.maps.StreetViewPanorama(
        document.getElementById("streetview"),
        {
            pov:{
                heading:0,
                pitch:0
            }
        }
    );

    map.addListener("click",(e)=>{

        guessPosition = e.latLng;

        if(guessMarker){
            guessMarker.setMap(null);
        }

        guessMarker = new google.maps.Marker({
            position:e.latLng,
            map:map,
            label:"?"
        });

        document.getElementById("guessBtn").disabled=false;
    });

    document
        .getElementById("guessBtn")
        .addEventListener("click",submitGuess);

    startRound();
}

function startRound(){

    clearRound();

    currentRound++;

    if(currentRound>maxRounds){

        alert(
            "Spel afgelopen!\n\nTotale score: "
            + totalScore
        );

        location.reload();
        return;
    }

    document.getElementById("round").textContent=currentRound;

    const random =
        locations[
            Math.floor(
                Math.random()*locations.length
            )
        ];

    actualLocation=random;

    panorama.setPosition(random);

    panorama.setPov({
        heading:Math.random()*360,
        pitch:0
    });

    guessPosition=null;

    document.getElementById("guessBtn").disabled=true;

    document.getElementById("result").innerHTML="";
}

function submitGuess(){

    if(!guessPosition) return;

    const actual =
        new google.maps.LatLng(
            actualLocation.lat,
            actualLocation.lng
        );

    const distance =
        google.maps.geometry.spherical
        .computeDistanceBetween(
            guessPosition,
            actual
        );

    const km = distance/1000;

    let roundScore =
        Math.max(
            0,
            Math.round(
                5000 - km*2
            )
        );

    totalScore += roundScore;

    document.getElementById("score")
        .textContent =
        "Score: " + totalScore;

    realMarker =
        new google.maps.Marker({
            position:actual,
            map:map,
            label:"✓"
        });

    line =
        new google.maps.Polyline({
            map:map,
            path:[
                guessPosition,
                actual
            ]
        });

    const bounds =
        new google.maps.LatLngBounds();

    bounds.extend(guessPosition);
    bounds.extend(actual);

    map.fitBounds(bounds);

    document.getElementById("result")
        .innerHTML =
        `
        Afstand:
        ${km.toFixed(1)} km
        <br>
        Punten:
        ${roundScore}
        <br><br>
        <button onclick="startRound()">
            Volgende ronde
        </button>
        `;
}

function clearRound(){

    if(guessMarker){
        guessMarker.setMap(null);
        guessMarker=null;
    }

    if(realMarker){
        realMarker.setMap(null);
        realMarker=null;
    }

    if(line){
        line.setMap(null);
        line=null;
    }
}

</script>

<script
async
defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDw3TS6An6KIbA_VOGQmug-1NTuHdwdQvY&libraries=geometry&callback=initMap">
</script>

</body>
</html>
