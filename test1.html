<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoGuessr Demo</title>

<style>
:root{
    --bg:#0b1220;
    --panel:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.1);
    --text:#e5e7eb;
    --accent:#3b82f6;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:system-ui,Arial;
}

body{
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at top, #1e293b, #0b1220);
}

.card{
    width:420px;
    padding:24px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter:blur(12px);
}

.card h1{
    margin-bottom:10px;
    font-size:22px;
}

.card p{
    opacity:.7;
    font-size:13px;
    margin-bottom:12px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid var(--border);
    background:rgba(0,0,0,0.2);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    filter:brightness(1.1);
}

/* GAME */
#game{
    display:none;
    height:100vh;
    width:100%;
}

#streetview{
    width:60%;
    height:100%;
}

#map{
    width:40%;
    height:100%;
}

/* HUD */
#hud{
    position:absolute;
    top:16px;
    left:16px;
    z-index:10;
    background:var(--panel);
    border:1px solid var(--border);
    backdrop-filter:blur(12px);
    padding:14px;
    border-radius:14px;
    width:240px;
}

.stat{
    margin-bottom:8px;
    font-size:14px;
}

#result{
    margin-top:10px;
    font-size:13px;
    opacity:.9;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <div class="card">
    <h1>GeoGuessr Demo</h1>
    <p>Voer je Google Maps API key + locatie in (adres of Maps URL)</p>

    <input id="apiKey" placeholder="API key">
    <input id="locationInput" placeholder="Adres of Google Maps link">

    <button onclick="startGame()">Start spel</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="stat">Score: <span id="score">0</span></div>
  <div class="stat">Ronde: <span id="round">1</span>/1</div>
  <button onclick="submitGuess()">Bevestig gok</button>
  <div id="result"></div>
</div>

<!-- GAME -->
<div id="game">
  <div id="streetview"></div>
  <div id="map"></div>
</div>

<script>

let map;
let panorama;
let guessMarker;
let actualMarker;
let line;

let guessPos;
let actualPos;

let score = 0;

function startGame(){

    const key = document.getElementById("apiKey").value.trim();
    const input = document.getElementById("locationInput").value.trim();

    if(!key || !input){
        alert("Vul API key en locatie in");
        return;
    }

    // load google maps script
    const script = document.createElement("script");
    script.src =
      `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=geometry&callback=initMap`;
    script.async = true;
    script.defer = true;
    document.body.appendChild(script);

    window._locationInput = input;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "flex";
}

function parseLocation(input){

    // Google Maps URL
    const match = input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if(match){
        return {
            lat: parseFloat(match[1]),
            lng: parseFloat(match[2])
        };
    }

    // fallback: geocode via Google
    return input;
}

function initMap(){

    const input = parseLocation(window._locationInput);

    const geocoder = new google.maps.Geocoder();

    const setLocation = (lat,lng)=>{

        actualPos = {lat,lng};

        map = new google.maps.Map(document.getElementById("map"),{
            center:actualPos,
            zoom:2,
            streetViewControl:false
        });

        panorama = new google.maps.StreetViewPanorama(
            document.getElementById("streetview"),
            {
                position:actualPos,
                pov:{heading:0,pitch:0}
            }
        );

        map.addListener("click",(e)=>{

            guessPos = e.latLng;

            if(guessMarker) guessMarker.setMap(null);

            guessMarker = new google.maps.Marker({
                position:e.latLng,
                map:map
            });
        });
    };

    if(typeof input === "string"){

        geocoder.geocode({address:input},(res,status)=>{

            if(status==="OK"){
                const loc = res[0].geometry.location;
                setLocation(loc.lat(),loc.lng());
            }else{
                alert("Locatie niet gevonden");
            }
        });

    } else {
        setLocation(input.lat,input.lng);
    }
}

function submitGuess(){

    if(!guessPos || !actualPos) return;

    const distance =
        google.maps.geometry.spherical.computeDistanceBetween(
            guessPos,
            new google.maps.LatLng(actualPos.lat,actualPos.lng)
        );

    const km = distance/1000;

    const roundScore = Math.max(0, Math.round(5000 - km*2));

    score += roundScore;

    document.getElementById("score").innerText = score;

    actualMarker = new google.maps.Marker({
        position:actualPos,
        map:map,
        label:"X"
    });

    line = new google.maps.Polyline({
        map:map,
        path:[guessPos,{lat:actualPos.lat,lng:actualPos.lng}]
    });

    map.fitBounds(new google.maps.LatLngBounds(
        guessPos,
        actualPos
    ));

    document.getElementById("result").innerHTML =
        `Afstand: ${km.toFixed(1)} km<br>Score: ${roundScore}`;
}

</script>

</body>
</html>
